<div class="login-box">
  <h2>Iniciar Sesión</h2>

  <form (ngSubmit)="onLogin()">
    <input type="email" [(ngModel)]="email" name="email" placeholder="Correo electrónico" required>
    <input type="password" [(ngModel)]="pass" name="pass" placeholder="Contraseña" required>
    
    <button type="submit">Ingresar</button>
  </form>

  <p *ngIf="errorMessage" class="error-msg">{{ errorMessage }}</p>

  <hr>

  <div class="fast-login">
    <h3>Accesos Rápidos (Testing)</h3>
    <button (click)="cargarUsuarioRapido(3)">Usuario Tester</button>
  </div>
</div>
